<h2 class="section-heading">Select Publications</h2>
<div class="theme-block publications-block" style="display: block;">
  <p class="publications-footer" style="margin: 0 0 1.25rem; text-align: center;">
    <strong>Full publication and patent list on <a href="https://scholar.google.com/citations?hl=en&user=v4NF1tEAAAAJ&view_op=list_works&sortby=pubdate">Google Scholar</a></strong>
  </p>

  <div class="publications-list">
    {% for pub in site.data.publications %}
      <article class="publication-item">
        <img src="{{ pub.image | relative_url }}" alt="Publication image" class="publication-item__image">

        <div class="publication-item__content">
          <strong>{{ pub.title }}</strong><br>
          {{ pub.authors }}<br>
          <span><em>{{ pub.journal }}</em>, {{ pub.year }}</span><br>
          <a href="{{ pub.DOI }}" target="_blank" rel="noopener noreferrer">{{ pub.DOI }}</a>
        </div>
      </article>
    {% endfor %}
  </div>
</div>
